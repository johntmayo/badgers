<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNL S51 Sketch Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
.app { display: flex; height: 100vh; overflow: hidden; }

.sidebar { width: 240px; background: #1a1a1a; color: #e8e6df; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.sidebar-header { padding: 18px 18px 14px; border-bottom: 1px solid #2d2d2d; }
.sidebar-logo { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #555; }
.sidebar-title { font-size: 17px; font-weight: 700; color: #f0ede6; margin-top: 4px; letter-spacing: -0.02em; }
.sidebar-sub { font-size: 11px; color: #555; margin-top: 2px; }
.ep-list { overflow-y: auto; flex: 1; }
.ep-item { padding: 10px 18px; cursor: pointer; border-bottom: 1px solid #222; transition: background 0.1s; }
.ep-item:hover { background: #242424; }
.ep-item.active { background: #2a2a2a; border-left: 3px solid #e8c84a; padding-left: 15px; }
.ep-num { font-size: 10px; color: #4a4a4a; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.ep-host { font-size: 13px; font-weight: 600; color: #e8e6df; margin-top: 2px; }
.ep-date { font-size: 11px; color: #555; margin-top: 1px; }
.ep-stats { font-size: 10px; color: #4a4a4a; margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
.ep-stats .rated { color: #888; }
.ep-stats .favs { color: #e8c84a; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header { background: #fff; border-bottom: 1px solid #e8e4dc; padding: 14px 24px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-shrink: 0; }
.main-title h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; color: #1a1a1a; }
.main-title p { font-size: 12px; color: #999; margin-top: 3px; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
.view-tabs { display: flex; gap: 4px; }
.view-tab { font-size: 11px; font-weight: 600; padding: 5px 13px; border-radius: 20px; border: 1px solid #ddd; background: transparent; color: #999; cursor: pointer; transition: all 0.15s; }
.view-tab.active { background: #1a1a1a; color: #f0ede6; border-color: #1a1a1a; }
.view-tab:hover:not(.active) { border-color: #bbb; color: #444; }
.rating-legend { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.legend-item { font-size: 10px; color: #bbb; white-space: nowrap; }
.legend-item span { color: #e8c84a; }

.sketches-area { flex: 1; overflow-y: auto; padding: 14px 24px 20px; }
.sketch-card { background: #fff; border: 1px solid #e8e4dc; border-radius: 10px; padding: 11px 15px; margin-bottom: 7px; transition: box-shadow 0.1s; }
.sketch-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.sketch-card.rated-5 { border-left: 3px solid #e8c84a; }
.sketch-card.rated-4 { border-left: 3px solid #a0c878; }
.sketch-top { display: flex; align-items: center; gap: 8px; }
.sketch-order { font-size: 10px; color: #ccc; font-weight: 600; width: 16px; flex-shrink: 0; }
.sketch-title-input { font-size: 14px; font-weight: 600; color: #1a1a1a; background: transparent; border: none; outline: none; flex: 1; font-family: inherit; min-width: 0; }
.sketch-title-input::placeholder { color: #ccc; font-weight: 400; }
.fav-btn { background: none; border: none; cursor: pointer; font-size: 15px; color: #ddd; padding: 0 1px; line-height: 1; transition: color 0.1s; flex-shrink: 0; }
.fav-btn.active { color: #e8c84a; }
.fav-btn:hover { color: #e8c84a; }
.del-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: #ddd; padding: 2px 5px; border-radius: 4px; transition: all 0.1s; flex-shrink: 0; }
.del-btn:hover { background: #fee; color: #c00; }
.sketch-row2 { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.stars { display: flex; gap: 1px; }
.star { font-size: 16px; cursor: pointer; color: #e8e2d8; line-height: 1; transition: color 0.1s; }
.star.lit { color: #e8c84a; }
.star:hover { color: #e8c84a; }
.rating-label { font-size: 10px; color: #bbb; font-style: italic; }
.cat-select { font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 20px; border: 1px solid #e0ddd6; background: #f8f7f3; color: #888; font-family: inherit; cursor: pointer; }
.fav-badge { font-size: 10px; background: #fffbea; color: #b8860b; border: 1px solid #f0d060; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
.sketch-fields { margin-top: 7px; display: flex; flex-direction: column; gap: 3px; }
.sketch-field { display: flex; align-items: baseline; gap: 6px; }
.field-label { font-size: 10px; color: #ccc; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; width: 34px; }
.sketch-input-sm { font-size: 12px; color: #555; background: transparent; border: none; outline: none; flex: 1; font-family: inherit; border-bottom: 1px solid transparent; padding: 1px 0; }
.sketch-input-sm:focus { border-bottom-color: #e0ddd6; color: #333; }
.sketch-input-sm::placeholder { color: #ddd; }
.sketch-summary { font-size: 11px; color: #aaa; margin-top: 6px; line-height: 1.5; font-style: italic; border-top: 1px solid #f5f2ee; padding-top: 6px; }

.add-sketch { margin-top: 6px; }
.add-btn { font-size: 13px; color: #aaa; background: transparent; border: 1px dashed #d8d4cc; border-radius: 10px; padding: 10px 16px; width: 100%; text-align: left; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.add-btn:hover { border-color: #bbb; color: #666; background: #fff; }
.add-form { background: #fff; border: 1px solid #d0cdc5; border-radius: 10px; padding: 14px 16px; }
.add-form label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #aaa; display: block; margin-bottom: 4px; }
.add-form input, .add-form select, .add-form textarea { font-size: 13px; width: 100%; background: #f8f7f3; border: 1px solid #e0ddd6; border-radius: 8px; padding: 7px 11px; color: #1a1a1a; font-family: inherit; margin-bottom: 10px; outline: none; }
.add-form input:focus, .add-form select:focus, .add-form textarea:focus { border-color: #aaa; }
.add-form textarea { resize: vertical; min-height: 52px; font-size: 12px; line-height: 1.5; }
.form-btns { display: flex; gap: 8px; margin-top: 2px; }
.btn-save { font-size: 12px; font-weight: 700; padding: 7px 18px; background: #1a1a1a; color: #f0ede6; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; }
.btn-save:hover { background: #333; }
.btn-cancel { font-size: 12px; padding: 7px 14px; background: transparent; color: #888; border: 1px solid #d0cdc5; border-radius: 8px; cursor: pointer; font-family: inherit; }

.ranked-area { flex: 1; overflow-y: auto; padding: 14px 24px 20px; }
.ranked-empty { text-align: center; padding: 60px 20px; }
.ranked-empty .icon { font-size: 36px; color: #ddd; margin-bottom: 12px; }
.ranked-empty p { font-size: 14px; color: #888; margin-bottom: 6px; }
.ranked-empty small { font-size: 12px; color: #bbb; }
.rank-item { display: flex; align-items: flex-start; gap: 14px; padding: 11px 16px; background: #fff; border: 1px solid #e8e4dc; border-radius: 10px; margin-bottom: 6px; }
.rank-item.top3 { border-left: 3px solid #e8c84a; }
.rank-num { font-size: 14px; font-weight: 700; color: #ddd; width: 22px; text-align: right; flex-shrink: 0; padding-top: 1px; }
.rank-num.gold { color: #e8c84a; }
.rank-num.silver { color: #b0b0b0; }
.rank-num.bronze { color: #cd7f32; }
.rank-info { flex: 1; min-width: 0; }
.rank-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
.rank-ep { font-size: 11px; color: #999; margin-top: 2px; }
.rank-cast { font-size: 11px; color: #bbb; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-notes { font-size: 11px; color: #aaa; font-style: italic; margin-top: 3px; }
.rank-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.rank-stars { font-size: 13px; color: #e8c84a; }
.rank-fav { font-size: 11px; color: #e8c84a; font-weight: 600; }
.rank-cat { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.rank-cat.cold { background: #e6f1fb; color: #185fa5; }
.rank-cat.pre { background: #eaf3de; color: #3b6d11; }
.rank-cat.update { background: #faeeda; color: #854f0b; }
.rank-cat.musical { background: #fbeaf0; color: #993556; }
.rank-cat.live { background: #f1efff; color: #534ab7; }

.empty-main { text-align: center; padding: 80px 20px; color: #ccc; font-size: 14px; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
.sidebar ::-webkit-scrollbar-thumb { background: #333; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Saturday Night Live</div>
      <div class="sidebar-title">Season 51 Tracker</div>
      <div class="sidebar-sub">2025–26</div>
    </div>
    <div class="ep-list" id="ep-list"></div>
  </div>
  <div class="main">
    <div class="main-header">
      <div class="main-title">
        <h2 id="main-title">Select an episode</h2>
        <p id="main-sub"></p>
      </div>
      <div class="header-right">
        <div class="view-tabs">
          <button class="view-tab active" onclick="setView('episode')">Episode</button>
          <button class="view-tab" onclick="setView('ranked')">Best of ★</button>
        </div>
        <div class="rating-legend">
          <div class="legend-item"><span>★</span> Offensive</div>
          <div class="legend-item"><span>★★</span> Weak</div>
          <div class="legend-item"><span>★★★</span> Pretty good</div>
          <div class="legend-item"><span>★★★★</span> Really good</div>
          <div class="legend-item"><span>★★★★★</span> Classic</div>
        </div>
      </div>
    </div>
    <div id="content-area" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></div>
  </div>
</div>

<script>
const CATS = { cold:'Cold Open', pre:'Pre-tape', update:'Weekend Update', musical:'Musical Performance', live:'Live Sketch' };
const RATING_LABELS = { 0:'', 1:'Downright offensive', 2:'Below average', 3:'Pretty good — nothing special', 4:'Really good — short of the pantheon', 5:'Outright classic' };

const BASE_EPISODES = [
  { id:"ep1", ep:"S51E01", date:"Oct 4, 2025", host:"Bad Bunny", musical:"Doja Cat", sketches:[
    { id:"s1_1", title:"Pete Hegseth Cold Opening", cat:"cold", cast:"Mikey Day, James Austin Johnson, Colin Jost, Jeremy Culhane", notes:"", rating:0, fav:false, summary:"Pete Hegseth (Colin Jost) gives an address to a room full of military officials before getting interrupted by President Donald Trump (James Austin Johnson). Also Features Mikey Day as Brendan Carr and Jeremy Culhane as the general. First appearance of Jeremy Culhane as a cast member." },
    { id:"s1_2", title:"Opening Montage", cat:"pre", cast:"Tommy Brennan, Jeremy Culhane, Ben Marshall, Kam Patterson, Veronika Slowikowska, Bad Bunny", notes:"", rating:0, fav:false, summary:"The previous opening montage returned, and it's completely retained but does not remain intact. Most notably, all SNL50 anniversary branding is stripped, either replaced by an ordinary SNL mark or stripped completely. In the title card, the flashing tribute of past logos is removed entirely, and a modified color grade is added to the wordmark. The show regularly updates its opening credits for each season to reflect cast changes and feature new shots of the cast members around New York City. Additionally, longtime cast members Heidi Gardner and Ego Nwodim, as well as three-year cast members Michael Longfellow and Devon Walker and featured player Emil Wakim are gone from the intro since they left the show before the start of the season. First credits for new cast members Tommy Brennan, Jeremy Culhane, Ben Marshall, Kam Patterson and Veronika Slowikowska. Also, the musical guests/hosts' introductions clips were changed to one and two, only for the season premiere (one clip for musical guest Doja Cat and two clips for host Bad Bunny)." },
    { id:"s1_3", title:"Monologue by Bad Bunny", cat:"live", cast:"Marcello Hernández, Bad Bunny", notes:"", rating:0, fav:false, summary:"Returning to host SNL for the second time, Puerto Rican rapper, singer-songwriter, record producer and actor Bad Bunny discusses filming Happy Gilmore 2, his residency in Puerto Rico and performing the Halftime Show at the Super Bowl before auditioning for characters he'd like to play. Also Features Marcello Hernandez and cameo by Jon Hamm." },
    { id:"s1_4", title:"Jeopardy with Bad Bunny", cat:"live", cast:"Andrew Dismukes, Kenan Thompson, Veronika Slowikowska, Bad Bunny", notes:"", rating:0, fav:false, summary:"A contestant (Bad Bunny) has some trouble understanding the rules of Jeopardy with Kenan Thompson, Veronika Slowikowska and Andrew Dismukes as the host Ken Jennings. First appearance of Veronika Slowikowska as a cast member." },
    { id:"s1_5", title:"ChatGPTio", cat:"pre", cast:"Mikey Day, Chloe Fineman, Marcello Hernández, Tommy Brennan, Jeremy Culhane, Ben Marshall, Veronika Slowikowska, Bad Bunny", notes:"", rating:0, fav:false, summary:"A commercial advertises a more authentic version of ChatGPT with Chloe Fineman, Veronika Slowikowska, Tommy Brennan, Mikey Day, Ben Marshall, and Jeremy Culhane. Also features Marcello Hernandez and Bad Bunny as the AI. First appearances of Tommy Brennan and Ben Marshall as cast members." },
    { id:"s1_6", title:"The Donor", cat:"live", cast:"Andrew Dismukes, Chloe Fineman, Marcello Hernández, Sarah Sherman, Kenan Thompson, Bowen Yang, Bad Bunny", notes:"", rating:0, fav:false, summary:"A couple (Chloe Fineman, Sarah Sherman) ask their friend to be their sperm donor (Andrew Dismukes). Also features Bad Bunny, Kenan Thompson, Marcello Hernandez and Bowen Yang as the waiter." },
    { id:"s1_7", title:"K-Pop Demon Hunters Brunch", cat:"live", cast:"Mikey Day, Chloe Fineman, Sarah Sherman, Bowen Yang, Bad Bunny", notes:"", rating:0, fav:false, summary:"A group of adults (Bad Bunny, Mikey Day, Sarah Sherman, Chloe Fineman) talk about K-Pop Demon Hunters. Also features Bowen Yang as Jinu and Cameos by HUNTR/X (EJAE, Audrey Nuna, and Rei Ami)." },
    { id:"s1_8", title:"Doja Cat performed \"AAAHH MEN!\"", cat:"musical", cast:"Doja Cat", notes:"", rating:0, fav:false, summary:"Musical Guest Doja Cat performed \"AAAHH MEN!\" on Saturday Night Live. Her musical set featured a vibrant, 1980s-inspired neon theme and a black-and-white checkered floor." },
    { id:"s1_9", title:"Weekend Update with Colin Jost and Michael Che", cat:"update", cast:"Colin Jost, Michael Che, Bowen Yang, Kam Patterson", notes:"", rating:0, fav:false, summary:"Weekend Update anchors Colin Jost and Michael Che tackle the week's biggest news, like the FCC approving an abortion pill before the government shutdown and A.I generated actress getting attention from Hollywood agents. With guests, new cast member Kam Patterson (in his very first Weekend Update on the show) stops by Weekend Update to discussed being a new cast member and joked about being unable to use a specific slur on air that is a regular part of his stand-up act, and the potential half-million dollar fine for doing so and Dobby the House Elf (Bowen Yang) stops by Weekend Update to discuss J. K. Rowling and her views on transgender people. First appearance of Kam Patterson as a cast member." },
    { id:"s1_10", title:"Inventing Spanish", cat:"live", cast:"Mikey Day, Andrew Dismukes, Marcello Hernández, James Austin Johnson, Kenan Thompson, Tommy Brennan, Jeremy Culhane, Ben Marshall, Kam Patterson, Bad Bunny", notes:"", rating:0, fav:false, summary:"A group of men (Bad Bunny, Marcello Hernández, Kenan Thompson, Mikey Day James Austin Johnson, and Andrew Dismukes) invent the Spanish language. Also Features Tommy Brennan, Jeremy Culhane, Kam Patterson, and Ben Marshall. Cameo by Benicio del Toro." },
    { id:"s1_11", title:"Doja Cat performed \"Gorgeous\"", cat:"musical", cast:"Doja Cat", notes:"", rating:0, fav:false, summary:"Musical Guest Doja Cat performed \"Gorgeous\" on Saturday Night Live. Her performance of \"Gorgeous\" featured a dramatic, moody rendition of the song, which included her sitting on a large rose bloom prop." },
    { id:"s1_12", title:"Parent Teacher Conference", cat:"live", cast:"Andrew Dismukes, Marcello Hernández, Ashley Padilla, Bad Bunny", notes:"", rating:0, fav:false, summary:"Things don’t go as expected when a student's (Marcello Hernández) hot dad (Bad Bunny) shows up to a parent teacher conference. Also Features Ashley Padilla as Nancy Humboldt and Andrew Dismukes as Robert." },
    { id:"s1_13", title:"The Kid From Number Eight", cat:"live", cast:"Andrew Dismukes, Chloe Fineman, Marcello Hernández, Sarah Sherman, Kenan Thompson, Bad Bunny", notes:"", rating:0, fav:false, summary:"Bad Bunny guides the cast (Marcello Hernandez, Kenan Thompson, Andrew Dismukes, Sarah Sherman, and Chloe Fineman) through an English language version of his favorite show from growing up El Chavo Del Ocho - or, “The Kid From Number 8.” Features Cameo by Jon Hamm." },
    { id:"s1_14", title:"Goodbyes and Closing Credits", cat:"live", cast:"Tommy Brennan, Jeremy Culhane, Ben Marshall, Kam Patterson, Veronika Slowikowska, Jane Wickline, Bad Bunny", notes:"", rating:0, fav:false, summary:"Bad Bunny thanked Doja Cat, Jon Hamm, Benicio del Toro, HUNTR/X, and his guy Petey, and everybody of SNL for having him back, that's has been here 51 years, and speaking something else in Spanish, and he especially thanked Lorne and he loved them all. Some of the cast point to Tommy Brennan, Jeremy Culhane, Ben Marshall, Kam Patterson and Veronika Slowikowska, since this is their first episode in the cast. Only Appearance of Jane Wickline." },
  ]},
  { id:"ep2", ep:"S51E02", date:"Oct 11, 2025", host:"Amy Poehler", musical:"Role Model", sketches:[
    { id:"s2_1", title:"Pam Bondi Hearing Cold Opening", cat:"cold", cast:"Mikey Day, Andrew Dismukes, James Austin Johnson, Tommy Brennan, Jeremy Culhane, Ashley Padilla, Amy Poehler", notes:"", rating:0, fav:false, summary:"Attorney General Pam Bondi (Amy Poehler) testifies before the Senate Judiciary Committee (Mikey Day, James Austin Johnson, Andrew Dismukes, Ashley Padilla, Jeremy Culhane, and Tommy Brennan). Cameo by SNL alum Tina Fey as Kristi Noem." },
    { id:"s2_2", title:"Opening Montage", cat:"pre", cast:"Amy Poehler", notes:"", rating:0, fav:false, summary:"The first \"Behind the Scenes\" set change from Cold Open to Monologue for the 51st season of Saturday Night Live, presented by T-Mobile. Also the musical guests/hosts' introductions clips of the opening montage were changed to opposed (two clips for musical guest Role Model and one clip for host Amy Poehler)." },
    { id:"s2_3", title:"Monologue by Amy Poehler", cat:"live", cast:"Tommy Brennan, Ben Marshall, Kam Patterson, Veronika Slowikowska, Amy Poehler", notes:"", rating:0, fav:false, summary:"Longtime former cast member and Weekend Update co-anchor Amy Poehler returned to SNL to host for the third time and her first solo hosting appearance in 15 years, 6 months, and 19 days. She talked about Saturday Night Live celebrating the 50th anniversary of its premiere, her Good Hang podcast and the current state of the world. Also features Kam Patterson, Ben Marshall, Jermey Culhane, Tommy Brennan, and Veronika Slowikowska." },
    { id:"s2_4", title:"The Rudemans", cat:"live", cast:"Mikey Day, Andrew Dismukes, Sarah Sherman, Bowen Yang, Ashley Padilla, Amy Poehler", notes:"", rating:0, fav:false, summary:"A woman (Ashley Padilla) introduces her boyfriend (Andrew Dismukes) to her standoffish family (Amy Poehler, Bowen Yang, Sarah Sherman, and Mikey Day). Andrew Dismukes' reached his 100th episode as an SNL cast member." },
    { id:"s2_5", title:"Non-Alcoholic Beer", cat:"pre", cast:"Andrew Dismukes, Ben Marshall, Ashley Padilla, Kam Patterson", notes:"", rating:0, fav:false, summary:"An commercial advertises a non-alcoholic beer that still gives a buzz. With Andrew Dismukes, Kam Patterson, Ashley Padilla, and Ben Marshall." },
    { id:"s2_6", title:"Psychic Talk Show", cat:"live", cast:"Marcello Hernández, James Austin Johnson, Sarah Sherman, Bowen Yang, Jeremy Culhane, Ben Marshall, Ashley Padilla, Kam Patterson, Veronika Slowikowska, Jane Wickline, Amy Poehler", notes:"", rating:0, fav:false, summary:"A talk show host (Amy Poehler) does psychic readings for her audience while interviewing a guest (James Austin Johnson). Also Features Sarah Sherman, Jeremy Culhane, Ashley Padilla, Ben Marshall, Kam Patterson, Veronika Slowikowska, Jane Wickline, Bowen Yang, and Marcello Hernandez." },
    { id:"s2_7", title:"The Hunting Wives Season 2 Trailer", cat:"pre", cast:"Chloe Fineman, Sarah Sherman, Tommy Brennan, Ashley Padilla, Kam Patterson, Amy Poehler", notes:"", rating:0, fav:false, summary:"A trailer teases Season 2 of Netflix's The Hunting Wives. With Chloe Fineman, Amy Poehler, Ashley Padilla, Sarah Sherman, Kam Patterson, and Tommy Brennan. Cameo by Aubrey Plaza." },
    { id:"s2_8", title:"Work Birth", cat:"live", cast:"Mikey Day, Sarah Sherman, Bowen Yang, Tommy Brennan, Ben Marshall, Ashley Padilla, Amy Poehler", notes:"", rating:0, fav:false, summary:"A pregnant woman (Amy Poehler) gives birth during a meeting with her employees (Sarah Sherman, Ashley Padilla, and Tommy Brennan). Also Features Ben Marshall, Mikey Day, and Bowen Yang. Also, Ashley Padilla made history this week as one of the only four featured players for most sketches in an episode among first-year featured players." },
    { id:"s2_9", title:"Role Model performed \"Sally, When the Wine Runs Out\"", cat:"musical", cast:"Amy Poehler, Role Model", notes:"", rating:0, fav:false, summary:"Musical Guest Role Model performed \"Sally, When the Wine Runs Out\" with Charli XCX on Saturday Night Live. Amy Poehler introduces tonight's musical guest Role Model while wore a photo of \"The Not Ready for Prime Time Players\" T-shirt. For his signature song \"Sally, When the Wine Runs Out\", Role Model brought out Charli XCX to play the part of \"Sally\". This mirrored his live show tradition of inviting special guests or fans onstage for the song." },
    { id:"s2_10", title:"Weekend Update with Colin Jost and Michael Che", cat:"update", cast:"Colin Jost, Michael Che, Marcello Hernández, Sarah Sherman, Jane Wickline, Amy Poehler", notes:"", rating:0, fav:false, summary:"Weekend Update anchors Colin Jost and Michael Che tackle the week's biggest news, like the U.S. Treasury planning to release a silver dollar with Trump’s face on it and an A.I. video app that allows users to make cameos of themselves. With guests, Rhonda LaCenzo (Sarah Sherman) stops by Weekend Update to discuss New York City mayoral race frontrunner Zohran Mamdani, The Couple You Can't Believe Are Together (Marcello Hernández, Jane Wickline) stop by Weekend Update to discuss cuffing season, and thinking they could do better, and former Weekend Update anchors Amy Poehler, Tina Fey and Seth Meyers reunite and take on Colin Jost and Michael Che in a joke off about a Tennessee woman who gave birth to a 13 pound baby. Amy Poehler pulled off an impressive feat on Saturday Night Live, appearing in both the Cold Open and on Weekend Update as SNL host." },
    { id:"s2_11", title:"Experienced Lawyers", cat:"live", cast:"Michael Che, Mikey Day, Andrew Dismukes, Chloe Fineman, Marcello Hernández, James Austin Johnson, Colin Jost, Sarah Sherman, Kenan Thompson, Bowen Yang, Tommy Brennan, Jeremy Culhane, Ben Marshall, Ashley Padilla, Kam Patterson, Veronika Slowikowska, Jane Wickline, Amy Poehler", notes:"", rating:0, fav:false, summary:"A commercial advertises a law firm that helps their clients fight against insurance companies. The entire cast (Minus Colin Jost and Michael Che) appear in the commercial skit. With Amy Poehler, Andrew Dismukes, James Austin Johnson, Tommy Brennan, Mikey Day, Kam Patterson, Ben Marshall, Veronika Slowikowska, Ashley Padilla, Chloe Fineman, Jane Wickline, Marcello Hernandez, Jeremy Culhane, Sarah Sherman, Bowen Yang, and Kenan Thompson." },
    { id:"s2_12", title:"Role Model performed \"Some Protector\"", cat:"musical", cast:"Role Model", notes:"", rating:0, fav:false, summary:"Musical Guest Role Model performed \"Some Protector\" on Saturday Night Live. Poehler wear another t-shirt with the original SNL logo. For his second performance of the night, Role Model (real name Tucker Pillsbury) delivered a more mellow, stripped-back rendition of \"Some Protector\"." },
    { id:"s2_13", title:"Emo Mom", cat:"live", cast:"Chloe Fineman, James Austin Johnson, Jeremy Culhane, Ben Marshall, Kam Patterson, Jane Wickline, Amy Poehler", notes:"", rating:0, fav:false, summary:"A mom (Amy Poehler) is confronted by her family (James Austin Johnson, Chloe Fineman, and Jeremy Culhane) over a phase she is going through. Also Features Jane Wickline, Kam Patterson, and Ben Marshall." },
    { id:"s2_14", title:"Theme Songs Masterclass", cat:"live", cast:"James Austin Johnson, Kenan Thompson, Bowen Yang, Tommy Brennan, Ben Marshall, Ashley Padilla, Jane Wickline, Amy Poehler", notes:"", rating:0, fav:false, summary:"Two television industry composers (Amy Poehler, Bowen Yang) share with a group of students how they created hit title songs for the biggest shows. Also Features James Austin Johnson as the teacher, Ben Marshall, Tommy Brennan, Jane Wickline, Ashley Padilla as the students, and Kenan Thompson as Theotus McNamara. Also, Ben Marshall crushed it on SNL this week, tying the record for most sketches in an episode among first-year featured players." },
    { id:"s2_15", title:"Goodbyes and Closing Credits", cat:"live", cast:"Amy Poehler", notes:"", rating:0, fav:false, summary:"Role Model, Tina Fey, Seth Meyers, Charli XCX, Lorne Michaels, the cast and crew of SNL and everybody are all thanked by Amy Poehler for bringing her back home and especially shoutout to her parents a \"Happy Anniversary\" and \"Happy Birthday\" to Greg, it's always a dream of a lifetime to be here and she loved them all." },
  ]},
  { id:"ep3", ep:"S51E03", date:"Oct 18, 2025", host:"Sabrina Carpenter", musical:"Sabrina Carpenter", sketches:[
    { id:"s3_1", title:"Domingo Cold Opening", cat:"cold", cast:"Andrew Dismukes, Chloe Fineman, Marcello Hernández, Sarah Sherman, Ashley Padilla, Veronika Slowikowska, Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"A group of friends (Sabrina Carpenter, Sarah Sherman, Ashley Padilla, and Veronika Slowikowska) perform for a birthday. Also Features Chloe Fineman as Kelsey, Andrew Dismukes as Matthew and Marcello Hernandez as Domingo." },
    { id:"s3_2", title:"Opening Montage", cat:"pre", cast:"Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"The second \"Behind the Scenes\" set change from Cold Open to Monologue for the 51st season of Saturday Night Live, presented by T-Mobile. Also, the musical guests/hosts' introductions clips of the opening montage were changed to two, only for this episode (for host and musical guest Sabrina Carpenter)." },
    { id:"s3_3", title:"Monologue by Sabrina Carpenter", cat:"live", cast:"Kenan Thompson, Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"Hosting for the first-time, two-time musical guest Sabrina Carpenter talks about the cover of her new album, Man's Best Friend and interacts with the audience. Also Features Kenan Thompson." },
    { id:"s3_4", title:"Boys Podcast: Snack Homiez", cat:"live", cast:"Chloe Fineman, James Austin Johnson, Veronika Slowikowska, Jane Wickline, Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"A group of twelve-year-old boys (Sabrina Carpenter, Chloe Fineman, Jane Wickline, and Veronika Slowikowska) host a podcast about snacks and interview President Trump (James Austin Johnson)." },
    { id:"s3_5", title:"Plans", cat:"pre", cast:"Mikey Day, Andrew Dismukes, Sarah Sherman, Tommy Brennan, Ben Marshall, Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"A movie trailer follows the horrifying story of a couple (Sabrina Carpenter, Ben Marshall) having plans that they forgot about. Also Features Sarah Sherman, Mikey Day, Tommy Brennan, and Andrew Dismukes." },
    { id:"s3_6", title:"Shop TV: Pillow", cat:"live", cast:"Mikey Day, Andrew Dismukes, James Austin Johnson, Kenan Thompson, Jeremy Culhane, Ashley Padilla, Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"Hosts Rhett & Bev (Mikey Day, Ashley Padilla) welcome a designer (Sabrina Carpenter) to show off her new luxury neck pillow. Also Features James Austin Johnson as Tim Tucker, Andrew Dismukes, Jeremy Culhane and Kenan Thompson as the voice of callers. Shop TV is back for the 4th time on SNL, with Ashley Padilla replacing Heidi Gardner as Mikey Day's co-host." },
    { id:"s3_7", title:"Girlboss Seminar", cat:"live", cast:"Chloe Fineman, Sarah Sherman, Kenan Thompson, Tommy Brennan, Jeremy Culhane, Ashley Padilla, Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"A woman (Sabrina Carpenter) holds a seminar on how to be a Girlboss. Also Features Chloe Fineman, Sarah Sherman, Tommy Brennan, Jeremy Culhane, Ashley Padilla and Kenan Thompson." },
    { id:"s3_8", title:"Grind Song", cat:"pre", cast:"Chloe Fineman, Marcello Hernández, Sarah Sherman, Kenan Thompson, Bowen Yang, Jeremy Culhane, Ben Marshall, Ashley Padilla, Kam Patterson, Veronika Slowikowska, Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"A group of middle schoolers (Sabrina Carpenter, Bowen Yang, Chloe Fineman, Sarah Sherman, Marcello Hernández, Jeremy Culhane, Ben Marshall, Kam Patterson, and Veronika Slowikowska) sing a song about grinding at a school dance. Also Features Ashley Padilla as Caroline's mother and Kenan Thompson as Principal Atkins." },
    { id:"s3_9", title:"Sabrina Carpenter performed \"Manchild\". Kenan Thompson introduces Carpenter's first performance", cat:"musical", cast:"Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"Musical Guest Sabrina Carpenter performed \"Manchild\" on Saturday Night Live. The stage was transformed into a retro bedroom, decorated with soft lighting, satin pillows, and a large bed. For the performance, Carpenter wore pink \"SNL\" logo pajamas \"Live from New York\", along with underwear embroidered with \"It's Saturday Night!\"." },
    { id:"s3_10", title:"Weekend Update with Colin Jost and Michael Che", cat:"update", cast:"Colin Jost, Michael Che, Marcello Hernández, Tommy Brennan", notes:"", rating:0, fav:false, summary:"Weekend Update anchors Colin Jost and Michael Che tackle the week's biggest news, like Trump telling reporters he’s not getting into heaven and a Chinese man getting an organ transplant from a Pig. With guests, The Movie Guy (Marcello Hernandez) stops by Weekend Update to discuss scary movies like The Black Phone 2, Weapons and more and new cast member Tommy Brennan (in his very first Weekend Update on the show) stops by Weekend Update to discuss growing up in the Midwest and moving to New York City." },
    { id:"s3_11", title:"Appliance Store", cat:"live", cast:"Andrew Dismukes, Kenan Thompson, Ashley Padilla, Veronika Slowikowska, Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"A man (Kenan Thompson) helps a couple (Andrew Dismukes, Ashley Padilla) buy a new washer (Sabrina Carpenter) and dryer (Veronika Slowikowska)." },
    { id:"s3_12", title:"Surprise", cat:"live", cast:"Andrew Dismukes, Sarah Sherman, Jeremy Culhane, Ben Marshall, Ashley Padilla, Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"A surprise party at the office doesn't go as expected. With Sabrina Carpenter, Andrew Dismukes, Sarah Sherman, Ashley Padilla, Ben Marshall and Jeremy Culhane." },
    { id:"s3_13", title:"Sabrina Carpenter performed \"'''Nobody's Son'''\". Chloe Fineman introduces Carpenter's second performance", cat:"musical", cast:"Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"Musical Guest Sabrina Carpenter performed \"Nobody's Son\" on Saturday Night Live. The set was designed to look like a karate dojo, complete with choreography inspired by martial arts. The song, which features lyrics about a breakup, included the uncensored line, \"He sure f—ked me up\". The profanity was not bleeped on the initial broadcast, although it was later edited out on some West Coast feeds and replays." },
    { id:"s3_14", title:"Social Experiment", cat:"pre", cast:"Kam Patterson, Veronika Slowikowska, Jane Wickline", notes:"", rating:0, fav:false, summary:"Martin Herlihy conducts a social experiment. Also Features Jane Wickline, Kam Patterson and Veronika Slowikowska." },
    { id:"s3_15", title:"Goodbyes and Closing Credits", cat:"live", cast:"Sabrina Carpenter", notes:"", rating:0, fav:false, summary:"Sabrina Carpenter thanked Lorne, the amazing cast and crew, this has been one of her biggest dreams and she's so, so great and even thanked everyone for having her here, she thanked them for laughing and she especially thanked them all for being such an amazing audience, and she hoped them they'll have a great night tonight." },
  ]},
  { id:"ep4", ep:"S51E04", date:"Nov 1, 2025", host:"Miles Teller", musical:"Brandi Carlile", sketches:[
    { id:"s4_1", title:"NYC Mayoral Debate Cold Opening", cat:"cold", cast:"James Austin Johnson, Kenan Thompson, Kam Patterson, Miles Teller", notes:"", rating:0, fav:false, summary:"Zohran Mamdani (Ramy Youssef), Andrew Cuomo (Miles Teller) and Curtis Sliwa (Shane Gillis) debate against each other in the race to become New York City's next mayor. With Kenan Thompson, Kam Patterson, and James Austin Johnson as President Donald Trump." },
    { id:"s4_2", title:"Opening Montage", cat:"pre", cast:"Miles Teller", notes:"", rating:0, fav:false, summary:"The third episode to feature \"Behind the Scenes\" set changes from Cold Open to the Monologue for the 51st season of Saturday Night Live, presented by T-Mobile. Also, the musical guests/hosts' introductions clips of the opening montage were changed to opposed again for this episode (one clip for musical guest Brandi Carlile and two clips for host Miles Teller)." },
    { id:"s4_3", title:"Monologue by Miles Teller", cat:"live", cast:"Miles Teller", notes:"", rating:0, fav:false, summary:"Returning to host SNL for the second time, actor Miles Teller reminisces dressing up as the Roxbury Guys for Halloween as a kid and talked about how SNL is starting to feel like home to him in his monologue for Saturday Night Live." },

    { id:"s4_5", title:"White House Makeover", cat:"pre", cast:"Chloe Fineman, James Austin Johnson, Miles Teller", notes:"", rating:0, fav:false, summary:"The Property Brothers (Miles Teller) help Donald and Melania Trump (James Austin Johnson, Chloe Fineman) renovate the White House." },
    { id:"s4_6", title:"Hockey PSA", cat:"live", cast:"Andrew Dismukes, Tommy Brennan, Ben Marshall, Ashley Padilla, Veronika Slowikowska, Miles Teller", notes:"", rating:0, fav:false, summary:"Hockey players (Miles Teller, Ben Marshall, Tommy Brennan) film a PSA for the National Hockey League's community outreach day. With Ashley Padilla, Andrew Dismukes, Veronika Slowikowska, and Jeremey Culhane." },
    { id:"s4_7", title:"Missing Wives Docuseries", cat:"pre", cast:"Sarah Sherman, Kenan Thompson, Ben Marshall, Ashley Padilla, Veronika Slowikowska, Miles Teller", notes:"", rating:0, fav:false, summary:"A new Netflix true crime show about three husbands (Miles Teller, Ben Marshall, Kenan Thompson) whose wives all mysteriously disappeared. With Veronika Slowikowska, Ashley Padilla, and Sarah Sherman." },

    { id:"s4_9", title:"Brandi Carlile performed \"Church & State\"", cat:"musical", cast:"Brandi Carlile", notes:"", rating:0, fav:false, summary:"Musical Guest Brandi Carlile performed \"Church & State\" on Saturday Night Live. Carlile opened her appearance with \"Church & State\", a track that addresses themes of sociopolitical unrest and a \"failing empire\"." },
    { id:"s4_10", title:"Weekend Update with Colin Jost and Michael Che", cat:"update", cast:"Colin Jost, Michael Che, Andrew Dismukes, Bowen Yang, Ashley Padilla", notes:"", rating:0, fav:false, summary:"Weekend Update anchors Colin Jost and Michael Che tackle the week's biggest news like Trump rating his meeting with Chinese President Xi Jinping a \"12 out of 10\" and a study finding that childhood peanut allergies are on the decline due to early exposure to peanuts. With guests, George Santos (Bowen Yang) stops by Weekend Update to discuss the New York City Marathon and how prison changed him and Two People Who Just Hooked Up (Andrew Dismukes, Ashley Padilla) stop by Weekend Update to discuss the government shutdown." },
    { id:"s4_11", title:"Murder Press Briefing", cat:"live", cast:"Andrew Dismukes, James Austin Johnson, Sarah Sherman, Bowen Yang, Tommy Brennan, Ben Marshall, Ashley Padilla, Miles Teller", notes:"", rating:0, fav:false, summary:"A homicide detective (Miles Teller) takes questions from reporters regarding a recent string of murders. With James Austin Johnson, Bowen Yang, Sarah Sherman, Andrew Dismukes, Jeremey Culhane, Tommy Brennan, Veronika Skolimowska, Ashley Padilla, and Ben Marshall." },
    { id:"s4_12", title:"Brandi Carlile performed \"Human\"", cat:"musical", cast:"Brandi Carlile", notes:"", rating:0, fav:false, summary:"Musical Guest Brandi Carlile performed \"Human\" on Saturday Night Live. Carlile has commented that the song and album are about looking inward and a journey back to her truest artistic self after years of high-profile collaborations. The song itself reflects on vulnerability and resilience." },
    { id:"s4_13", title:"Italian Restaurant Date", cat:"live", cast:"Mikey Day, Chloe Fineman, Marcello Hernández, Kenan Thompson, Miles Teller", notes:"", rating:0, fav:false, summary:"Two flirtatious waiters (Miles Teller, Marcello Hernández) interrupt a couple's romantic date night. With Chloe Fineman, Mikey Day, and Kenan Thompson." },
    { id:"s4_14", title:"Goodbyes and Closing Credits", cat:"live", cast:"Miles Teller", notes:"", rating:0, fav:false, summary:"Miles Teller says thanks to Brandi Carlile, Ramy Youssef, Shane Gillis, Lorne, The Band, The Cast, he also thanked the audience for joining them, he had a lot of fun this week and he especially thanked them all for having him back." },
  ]},

    { id:"s9_13", title:"Delta Lounge", cat:"live", cast:"Andrew Dismukes, Kenan Thompson, Bowen Yang, Jane Wickline, Ariana Grande", notes:"", rating:0, fav:false, summary:"A Delta One Lounge Employee (Bowen Yang) manages the eggnog machine during the holidays. Also features Jane Wickline, Andrew Dismukes, Kenan Thompson, Host Ariana Grande, and cameo by Musical Guest Cher. This marked the final SNL sketch appearance of Bowen Yang as SNL cast member. Made as a sendoff to Yang, as he left the show after the Christmas episode. To mark his departure, Grande and Cher join him in singing \"Please Come Home for Christmas\" during his farewell sketch, \"Delta Lounge\"." },
    { id:"s9_14", title:"Band Shot", cat:"live", cast:"", notes:"", rating:0, fav:false, summary:"The Saturday Night Live Band plays the final music piece during the final commercial break." },

let episodes = JSON.parse(JSON.stringify(BASE_EPISODES));
let activeEpId = 'ep1';
let currentView = 'episode';
let showAddForm = false;

function loadData() {
  try { const s = localStorage.getItem('snl51_v3'); if (s) episodes = JSON.parse(s); } catch(e) {}
}
function saveData() {
  try { localStorage.setItem('snl51_v3', JSON.stringify(episodes)); } catch(e) {}
}
function getEp() { return episodes.find(e => e.id === activeEpId); }

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-tab').forEach(t => {
    t.classList.toggle('active', (v==='episode' && t.textContent.includes('Episode')) || (v==='ranked' && t.textContent.includes('Best')));
  });
  v === 'ranked' ? renderRanked() : renderEpisode();
}

function selectEp(id) {
  activeEpId = id;
  showAddForm = false;
  if (currentView !== 'ranked') {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.textContent.includes('Episode')));
    currentView = 'episode';
  }
  renderSidebar();
  currentView === 'ranked' ? renderRanked() : renderEpisode();
}

function renderSidebar() {
  document.getElementById('ep-list').innerHTML = episodes.map(ep => {
    const rated = ep.sketches.filter(s => s.rating > 0).length;
    const favs = ep.sketches.filter(s => s.fav).length;
    const total = ep.sketches.length;
    let stats = total > 0 ? `<span>${total} sketches</span>` : `<span style="color:#333">No sketches yet</span>`;
    if (rated) stats += `<span class="rated">${rated} rated</span>`;
    if (favs) stats += `<span class="favs">♥ ${favs}</span>`;
    return `<div class="ep-item ${ep.id===activeEpId?'active':''}" onclick="selectEp('${ep.id}')">
      <div class="ep-num">${ep.ep}</div>
      <div class="ep-host">${escHtml(ep.host)}</div>
      <div class="ep-date">${ep.date}</div>
      <div class="ep-stats">${stats}</div>
    </div>`;
  }).join('');
}

function renderEpisode() {
  const content = document.getElementById('content-area');
  const ep = getEp();
  if (!ep) { content.innerHTML = '<div class="empty-main">← Choose an episode</div>'; return; }
  document.getElementById('main-title').textContent = ep.host;
  document.getElementById('main-sub').textContent = `${ep.ep} · ${ep.date} · Musical guest: ${ep.musical}`;

  const cards = ep.sketches.map((s, i) => {
    const rc = s.rating === 5 ? 'rated-5' : s.rating === 4 ? 'rated-4' : '';
    return `<div class="sketch-card ${rc}">
      <div class="sketch-top">
        <span class="sketch-order">${i+1}</span>
        <input class="sketch-title-input" value="${escHtml(s.title)}" onchange="updateField('${ep.id}','${s.id}','title',this.value)" placeholder="Sketch title" />
        <button class="fav-btn ${s.fav?'active':''}" onclick="toggleFav('${ep.id}','${s.id}')" title="Favorite">♥</button>
        <button class="del-btn" onclick="deleteSketch('${ep.id}','${s.id}')">✕</button>
      </div>
      <div class="sketch-row2">
        <div class="stars">${[1,2,3,4,5].map(n=>`<span class="star ${s.rating>=n?'lit':''}" onclick="setRating('${ep.id}','${s.id}',${n})">★</span>`).join('')}</div>
        <span class="rating-label">${RATING_LABELS[s.rating]}</span>
        <select class="cat-select" onchange="updateField('${ep.id}','${s.id}','cat',this.value)">
          ${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${s.cat===k?'selected':''}>${v}</option>`).join('')}
        </select>
        ${s.fav?'<span class="fav-badge">♥ Fave</span>':''}
      </div>
      <div class="sketch-fields">
        <div class="sketch-field">
          <span class="field-label">Cast</span>
          <input class="sketch-input-sm" value="${escHtml(s.cast)}" onchange="updateField('${ep.id}','${s.id}','cast',this.value)" placeholder="Cast members featured…" />
        </div>
        <div class="sketch-field">
          <span class="field-label">Notes</span>
          <input class="sketch-input-sm" value="${escHtml(s.notes)}" onchange="updateField('${ep.id}','${s.id}','notes',this.value)" placeholder="Your notes…" />
        </div>
      </div>
      ${s.summary?`<div class="sketch-summary">${escHtml(s.summary)}</div>`:''}
    </div>`;
  }).join('');

  const addHtml = showAddForm ? `<div class="add-form">
    <label>Sketch title</label>
    <input id="new-title" placeholder="e.g. Weekend Update" />
    <label>Category</label>
    <select id="new-cat">${Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
    <label>Cast members</label>
    <input id="new-cast" placeholder="e.g. Kenan Thompson, Mikey Day" />
    <label>Summary / Notes</label>
    <textarea id="new-summary" placeholder="Brief description or your notes…"></textarea>
    <div class="form-btns">
      <button class="btn-save" onclick="addSketch('${ep.id}')">Add sketch</button>
      <button class="btn-cancel" onclick="cancelAdd()">Cancel</button>
    </div>
  </div>` : `<button class="add-btn" onclick="showAdd()">+ Add sketch</button>`;

  const emptyMsg = ep.sketches.length === 0 ? '<div style="text-align:center;padding:40px 0;color:#ccc;font-size:13px;">No sketches yet — add them below</div>' : '';
  content.innerHTML = `<div class="sketches-area">${emptyMsg}${cards}<div class="add-sketch">${addHtml}</div></div>`;
  if (showAddForm) setTimeout(() => { const t = document.getElementById('new-title'); if(t) t.focus(); }, 30);
}

function renderRanked() {
  const content = document.getElementById('content-area');
  document.getElementById('main-title').textContent = 'Best of Season 51';
  document.getElementById('main-sub').textContent = 'All rated & favorited sketches ranked';

  const all = [];
  episodes.forEach(ep => ep.sketches.forEach(s => { if (s.rating > 0 || s.fav) all.push({...s, epHost:ep.host, epDate:ep.date, epNum:ep.ep}); }));
  all.sort((a,b) => (b.rating-a.rating) || (b.fav-a.fav) || a.title.localeCompare(b.title));

  if (!all.length) {
    content.innerHTML = `<div class="ranked-area"><div class="ranked-empty"><div class="icon">★</div><p>No rated sketches yet</p><small>Go to an episode and rate some sketches — they'll appear here ranked</small></div></div>`;
    return;
  }

  const numCls = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const html = all.map((s,i)=>`<div class="rank-item ${i<3?'top3':''}">
    <div class="rank-num ${numCls(i)}">${i+1}</div>
    <div class="rank-info">
      <div class="rank-title">${escHtml(s.title)}</div>
      <div class="rank-ep">${s.epNum} · ${s.epDate} · ${s.epHost}</div>
      ${s.cast?`<div class="rank-cast">${escHtml(s.cast)}</div>`:''}
      ${s.notes?`<div class="rank-notes">"${escHtml(s.notes)}"</div>`:''}
    </div>
    <div class="rank-right">
      <div class="rank-stars">${'★'.repeat(s.rating)}</div>
      ${s.fav?'<div class="rank-fav">♥ Fave</div>':''}
      <span class="rank-cat ${s.cat}">${CATS[s.cat]||s.cat}</span>
    </div>
  </div>`).join('');

  content.innerHTML = `<div class="ranked-area">${html}</div>`;
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function updateField(epId, sId, field, val) {
  const s = episodes.find(e=>e.id===epId).sketches.find(s=>s.id===sId);
  s[field] = val; saveData(); renderSidebar();
  if (currentView==='ranked') renderRanked();
}

function setRating(epId, sId, rating) {
  const s = episodes.find(e=>e.id===epId).sketches.find(s=>s.id===sId);
  s.rating = s.rating===rating ? 0 : rating;
  saveData(); renderSidebar(); renderEpisode();
}

function toggleFav(epId, sId) {
  const s = episodes.find(e=>e.id===epId).sketches.find(s=>s.id===sId);
  s.fav = !s.fav; saveData(); renderSidebar(); renderEpisode();
}

function deleteSketch(epId, sId) {
  if (!confirm('Remove this sketch?')) return;
  const ep = episodes.find(e=>e.id===epId);
  ep.sketches = ep.sketches.filter(s=>s.id!==sId);
  saveData(); renderSidebar(); renderEpisode();
}

function showAdd() { showAddForm = true; renderEpisode(); }
function cancelAdd() { showAddForm = false; renderEpisode(); }

function addSketch(epId) {
  const title = (document.getElementById('new-title').value||'').trim();
  if (!title) { document.getElementById('new-title').focus(); return; }
  const ep = episodes.find(e=>e.id===epId);
  ep.sketches.push({ id:'sk_'+Date.now(), title, cat:document.getElementById('new-cat').value, cast:document.getElementById('new-cast').value, notes:'', summary:document.getElementById('new-summary').value, rating:0, fav:false });
  showAddForm = false; saveData(); renderSidebar(); renderEpisode();
}

loadData(); renderSidebar(); renderEpisode();
</script>
